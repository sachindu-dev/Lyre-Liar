<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:18px;display:flex;gap:18px;align-items:center;}
  .icon{width:96px;height:96px;flex:0 0 auto;}
  .meta{font-family:var(--font-body);font-size:12px;color:var(--parchment);line-height:1.6;}
  .meta .tag{display:inline-block;background:#222;color:var(--state-mode);padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;margin-right:6px;}
  .meta .warn{color:var(--state-timeout);font-family:var(--font-mono);font-size:11px;display:block;margin-top:6px;}
</style></head>
<body><div class="wrap">
  <img class="icon" src="../assets/logo/godot-icon.svg" alt="">
  <div class="meta">
    <span class="tag">placeholder</span>shipped app icon
    <br><br>The current icon is Godot's default. A real Lyre &amp; Liar wordmark / mark has not been designed yet.
    <span class="warn">⚠ Flag: commission a proper logo.</span>
  </div>
</div></body></html>
