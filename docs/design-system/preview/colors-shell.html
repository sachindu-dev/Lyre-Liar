<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--shell-void);color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:center;}
  .row{display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
  .sw{width:100%;height:60px;border-radius:4px;border:1px solid rgba(255,255,255,0.05);}
  .name{font-family:var(--font-mono);font-size:13px;color:var(--parchment);letter-spacing:0.02em;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--state-version);}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="sw" style="background:var(--shell-void);"></div><div class="name">shell · void</div><div class="hex">#080F08</div></div>
  <div class="row"><div class="sw" style="background:var(--brass-rule);"></div><div class="name">brass · rule</div><div class="hex">#C78D2E</div></div>
  <div class="row"><div class="sw" style="background:var(--brass-deep);"></div><div class="name">brass · deep</div><div class="hex">#522E0F</div></div>
  <div class="row"><div class="sw" style="background:var(--brass-glow);"></div><div class="name">brass · glow</div><div class="hex">#D9B366</div></div>
  <div class="row"><div class="sw" style="background:var(--parchment);"></div><div class="name">parchment</div><div class="hex">#F2E5D9</div></div>
  <div class="row"><div class="sw" style="background:var(--parchment-dim);"></div><div class="name">parchment · dim</div><div class="hex">#F2F2BF</div></div>
  <div class="row"><div class="sw" style="background:var(--shell-amber);"></div><div class="name">shell · amber</div><div class="hex">#CCB34D</div></div>
  <div class="row"><div class="sw" style="background:linear-gradient(180deg,#4F4F4F,#353535);"></div><div class="name">button · base</div><div class="hex">godot stylebox</div></div>
</div></body></html>
