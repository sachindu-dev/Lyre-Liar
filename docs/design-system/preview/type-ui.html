<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--shell-void);color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .sample{flex:0 0 auto;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--state-version);letter-spacing:0.04em;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="sample" style="font-family:var(--font-ui);font-size:40px;color:var(--state-died);text-shadow:0 2px 0 rgba(0,0,0,0.8);text-transform:uppercase;letter-spacing:0.06em;">You died</div><div class="meta">jersey 25 · 40px · overlay title</div></div>
  <div class="row"><div class="sample" style="font-family:var(--font-ui);font-size:36px;color:var(--state-complete);text-shadow:0 2px 0 rgba(0,0,0,0.8);text-transform:uppercase;letter-spacing:0.06em;">Level complete</div><div class="meta">36px · complete</div></div>
  <div class="row"><div class="sample" style="font-family:var(--font-ui);font-size:32px;color:var(--state-paused);text-shadow:0 2px 0 rgba(0,0,0,0.8);text-transform:uppercase;letter-spacing:0.06em;">Paused</div><div class="meta">32px · pause</div></div>
  <div class="row"><div class="sample" style="font-family:var(--font-ui);font-size:22px;color:var(--label-multi);text-transform:uppercase;letter-spacing:0.06em;">Host game</div><div class="meta">22px · button label</div></div>
  <div class="row"><div class="sample" style="font-family:var(--font-ui);font-size:14px;color:var(--state-mode);text-transform:uppercase;letter-spacing:0.16em;">Select map</div><div class="meta">14px · mode label / 0.16em track</div></div>
</div></body></html>
