<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--shell-void);color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .rule{height:6px;width:560px;background:var(--brass-rule);}
  .title{font-family:var(--font-display);font-weight:900;font-size:64px;color:var(--parchment);letter-spacing:0.04em;text-shadow:0 3px 0 rgba(82,46,15,0.8);line-height:1;}
  .sub{font-family:var(--font-body);font-style:italic;font-size:18px;color:var(--brass-glow);margin-bottom:6px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--state-version);margin-top:10px;letter-spacing:0.04em;}
</style></head>
<body><div class="wrap">
  <div class="rule"></div>
  <div class="title">LYRE &amp; LIAR</div>
  <div class="sub">Whisper me a betrayal</div>
  <div class="rule"></div>
  <div class="meta">cinzel 900 · 52–64px · all caps · 0.04em · brass-deep 3px shadow</div>
</div></body></html>
