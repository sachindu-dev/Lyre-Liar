<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:18px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;}
  .sprite{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sprite img{image-rendering:pixelated;image-rendering:crisp-edges;height:48px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--state-version);text-align:center;}
</style></head>
<body><div class="wrap">
  <div class="sprite"><img src="../assets/sprites/bee.png" alt="" style="height:32px;"><div class="lbl">bee · enemy</div></div>
  <div class="sprite"><img src="../assets/sprites/slug.png" alt="" style="height:32px;"><div class="lbl">slug · enemy</div></div>
  <div class="sprite"><img src="../assets/sprites/piranha-plant.png" alt="" style="height:48px;"><div class="lbl">piranha plant</div></div>
  <div class="sprite"><img src="../assets/sprites/piranha-plant-attack.png" alt="" style="height:48px;"><div class="lbl">piranha · attack</div></div>
  <div class="sprite"><img src="../assets/sprites/carrot.png" alt="" style="height:32px;"><div class="lbl">carrot · pickup</div></div>
  <div class="sprite"><img src="../assets/sprites/star.png" alt="" style="height:32px;"><div class="lbl">star · pickup</div></div>
</div></body></html>
