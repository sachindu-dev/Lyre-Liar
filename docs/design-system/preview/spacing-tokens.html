<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--shell-void);color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;gap:16px;}
  .bar{height:18px;background:var(--brass-rule);border-radius:1px;}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--state-version);min-width:120px;}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--parchment);min-width:80px;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="tag">space-rule</div><div class="val">6 px</div><div class="bar" style="width:200px;height:6px;"></div></div>
  <div class="row"><div class="tag">space-overlay-sep</div><div class="val">16 px</div><div class="bar" style="width:200px;height:16px;"></div></div>
  <div class="row"><div class="tag">space-vbox-sep</div><div class="val">18 px</div><div class="bar" style="width:200px;height:18px;"></div></div>
  <div class="row"><div class="tag">btn-overlay-h</div><div class="val">50 px</div><div class="bar" style="width:240px;height:50px;background:linear-gradient(180deg,#4F4F4F,#353535);"></div></div>
  <div class="row"><div class="tag">btn-h</div><div class="val">56 px</div><div class="bar" style="width:280px;height:56px;background:linear-gradient(180deg,#4F4F4F,#353535);"></div></div>
</div></body></html>
