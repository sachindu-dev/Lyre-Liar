<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:14px 18px;}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
  .tile{width:48px;height:48px;background-size:cover;background-position:0 0;image-rendering:pixelated;border:1px solid #222;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--parchment);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--state-version);margin-left:auto;}
</style></head>
<body><div class="wrap">
  <div class="row"><img class="tile" src="../assets/tilesets/grass-surface.png"><div class="lbl">grass · surface</div><div class="hex">day · level_2</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/dirt-body.png"><div class="lbl">dirt · body</div><div class="hex">day</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/stone-surface.png"><div class="lbl">stone · surface</div><div class="hex">night · level_1</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/stone-body.png"><div class="lbl">stone · body</div><div class="hex">night</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/fungus-surface.png"><div class="lbl">fungus · surface</div><div class="hex">night</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/glow-surface.png"><div class="lbl">glow · surface</div><div class="hex">forest · level_4</div></div>
  <div class="row"><img class="tile" src="../assets/tilesets/bedrock.png"><div class="lbl">bedrock</div><div class="hex">all</div></div>
</div></body></html>
