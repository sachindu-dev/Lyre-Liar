<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--shell-void);color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .st{display:flex;flex-direction:column;gap:6px;}
  .swatch{height:70px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:18px;letter-spacing:0.06em;text-transform:uppercase;}
  .name{font-family:var(--font-mono);font-size:12px;color:var(--parchment);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--state-version);}
</style></head>
<body><div class="wrap">
  <div class="st"><div class="swatch" style="background:var(--shell-hush);color:var(--state-paused);">Paused</div><div class="name">state · paused</div><div class="hex">#FFD94D / 0,0,0,.6</div></div>
  <div class="st"><div class="swatch" style="background:var(--shell-bloodshade);color:var(--state-died);">You died</div><div class="name">state · died</div><div class="hex">#FF3333 / 64,0,0,.7</div></div>
  <div class="st"><div class="swatch" style="background:var(--shell-hush-deep);color:var(--state-timeout);">Too late</div><div class="name">state · timeout</div><div class="hex">#FF9933 / 0,0,0,.7</div></div>
  <div class="st"><div class="swatch" style="background:var(--shell-glade);color:var(--state-complete);">Complete</div><div class="name">state · complete</div><div class="hex">#99FF66 / 0,38,13,.7</div></div>
  <div class="st"><div class="swatch" style="background:#181818;color:var(--state-timer);font-family:var(--font-mono);">00:42</div><div class="name">state · timer</div><div class="hex">#FFE666</div></div>
  <div class="st"><div class="swatch" style="background:#181818;color:var(--state-mode);font-size:13px;">Select map</div><div class="name">state · mode</div><div class="hex">#8CC773</div></div>
  <div class="st"><div class="swatch" style="background:#181818;color:var(--state-status);font-family:var(--font-body);font-size:13px;text-transform:none;">Hosting…</div><div class="name">state · status</div><div class="hex">#8CD98C</div></div>
  <div class="st"><div class="swatch" style="background:#181818;color:var(--state-version);font-family:var(--font-body);font-size:13px;text-transform:none;">v0.1.0</div><div class="name">state · version</div><div class="hex">#59874D</div></div>
</div></body></html>
