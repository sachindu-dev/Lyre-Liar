<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .bg{height:130px;border-radius:4px;background-size:cover;background-position:center;position:relative;overflow:hidden;}
  .lbl{position:absolute;left:8px;bottom:6px;font-family:var(--font-mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.8);}
</style></head>
<body><div class="wrap">
  <div class="bg" style="background-image:url('../assets/backgrounds/cave-bg-1.png');"><div class="lbl">cave-bg-1 · night</div></div>
  <div class="bg" style="background-image:url('../assets/backgrounds/cave-bg-2.png');background-color:#0e1f1d;"><div class="lbl">cave-bg-2</div></div>
  <div class="bg" style="background-image:url('../assets/backgrounds/cave-bg-3.png');background-color:#1a1a26;"><div class="lbl">cave-bg-3</div></div>
  <div class="bg" style="background-image:url('../assets/backgrounds/cave-bg-4a.png');background-color:#0a0a1a;"><div class="lbl">cave-bg-4a</div></div>
  <div class="bg" style="background-image:url('../assets/backgrounds/grass-bg.png');"><div class="lbl">grass · day</div></div>
  <div class="bg" style="background-image:url('../assets/backgrounds/grass-mid.png');background-color:#5fa;"><div class="lbl">grass · mid</div></div>
</div></body></html>
