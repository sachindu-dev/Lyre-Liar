<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:var(--parchment);font-family:var(--font-body);width:700px;}
  .wrap{padding:18px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;}
  .sprite{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sprite img{image-rendering:pixelated;image-rendering:crisp-edges;height:96px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--state-version);text-align:center;}
</style></head>
<body><div class="wrap">
  <div class="sprite"><img src="../assets/sprites/pink-monster.png" alt=""><div class="lbl">pink monster</div></div>
  <div class="sprite"><img src="../assets/sprites/owlet-monster.png" alt=""><div class="lbl">owlet</div></div>
  <div class="sprite"><img src="../assets/sprites/dude-monster.png" alt=""><div class="lbl">dude</div></div>
  <div class="sprite"><img src="../assets/sprites/hermit-front.png" alt=""><div class="lbl">hermit</div></div>
</div></body></html>
